name: hackintosh_companion4
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_3d_controller: ^2.3.0
  sqflite: ^2.3.0
  path: ^1.9.0
  http: ^1.2.0
  image_picker: ^1.0.7
  fl_chart: ^0.66.0
  mobile_scanner: ^5.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1   # <-- NUR dependency hier

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/models/thinkpad.glb