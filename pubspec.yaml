name: hackintosh_companion4
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_3d_controller: ^2.3.0  # Von 1.3.1 auf 2.3.0 anheben
  sqflite: ^2.3.0
  path: ^1.9.0
  http: ^1.2.0
  image_picker: ^1.0.7
  fl_chart: ^0.66.0
  mobile_scanner: ^5.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # Zuerst den ganzen Ordner (optional, aber sicher ist sicher)
    - assets/models/
    # Und hier die Datei ganz spezifisch angeben:
    - assets/models/thinkpad.glb